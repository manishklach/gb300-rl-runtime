name: verilator

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  verilator-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Run basic co-sim
        run: make sim-rtl

      - name: Run bridge tests
        run: make test-rtl-bridge
